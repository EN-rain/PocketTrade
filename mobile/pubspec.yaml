name: pocket_trade
description: PocketTrade Flutter app.
publish_to: 'none'
version: 1.0.12+13

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  intl: ^0.19.0
  socket_io_client: ^3.0.2
  shared_preferences: 2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/pockettrade_icon.png
